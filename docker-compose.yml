version: "3.8"

services:
  superset:
    image: apache/superset:3.1.0
    container_name: superset-ai-superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=superset-ai-dev-secret-key-change-in-prod
      - SUPERSET_LOAD_EXAMPLES=yes
      - TALISMAN_ENABLED=false
    volumes:
      - superset_data:/app/superset_home
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >
      sh -c "superset db upgrade && superset fab create-admin --username admin --firstname Admin --lastname User --email admin@localhost --password admin || true && superset init && superset load_examples --force || true && superset run -h 0.0.0.0 -p 8088 --with-threads --reload"

volumes:
  superset_data:
